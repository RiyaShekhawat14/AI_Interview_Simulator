services:
  - type: web
    name: ai-interview-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ai-interview-backend
          envVarKey: PUBLIC_API_URL

  - type: web
    name: ai-interview-backend
    env: python
    rootDir: backend
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_MINUTES
        value: "720"
      - key: SESSION_TTL_SECONDS
        value: "7200"
      - key: PUBLIC_API_URL
        value: https://ai-interview-backend-wooa.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "120"
      - key: ENABLE_SPEECH_TO_TEXT
        value: "false"
      - key: ENABLE_EMOTION_DETECTION
        value: "false"
      - key: CACHE_ENABLED
        value: "false"
      - key: REDIS_NAMESPACE
        value: ai_interview
      - key: HEALTH_CACHE_TTL_SECONDS
        value: "15"
      - key: QUESTION_CACHE_TTL_SECONDS
        value: "180"
      - key: CODE_CACHE_TTL_SECONDS
        value: "300"
      - key: REPORT_CACHE_TTL_SECONDS
        value: "30"
      - key: LLAMA_MODEL
        value: mistral:latest
      - key: LLAMA_FALLBACK_MODEL
        value: llama3:8b
      - key: LLAMA_TIMEOUT_SECONDS
        value: "45"
      - key: LLAMA_CONNECT_TIMEOUT_SECONDS
        value: "1.5"
      - key: LLAMA_DISABLE_COOLDOWN_SECONDS
        value: "30"

databases:
  - name: ai-interview-db
    plan: free
